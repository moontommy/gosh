name: Build

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"

      - name: Download dependencies
        run: go mod download

      - name: Build Linux
        run: GOOS=linux GOARCH=amd64 go build -ldflags "-X main.modulePath=github.com/moontommy/gosh"-o gosh-linux .

      - name: Build Windows
        run: GOOS=windows GOARCH=amd64 go build -ldflags "-X main.modulePath=github.com/moontommy/gosh" -o gosh.exe .

      - name: Build macOS
        run: GOOS=darwin GOARCH=amd64 go build -ldflags "-X main.modulePath=github.com/moontommy/gosh" -o gosh-macos .

      - name: Create Release and Upload Binaries
        uses: softprops/action-gh-release@v1
        with:
          files: |
            gosh-linux
            gosh.exe
            gosh-macos
